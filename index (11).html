<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arepepa — Sistema de Informes de Revisión</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:#C0392B; --red-light:#FDECEA; --red-mid:#E57373;
  --amber:#B7770D; --amber-light:#FEF3DC;
  --green:#2E7D32; --green-light:#E8F5E9;
  --blue:#1565C0; --blue-light:#E3F0FF;
  --bg:#F7F5F2; --surface:#FFFFFF;
  --border:#E2DDD8; --border2:#CCC7C0;
  --text:#1A1917; --text2:#6B6760; --text3:#A09D99;
  --radius:10px; --radius-sm:6px;
  --shadow:0 1px 4px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.05);
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; line-height:1.6; }

header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:50; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:36px; height:36px; background:var(--red); border-radius:8px; display:flex; align-items:center; justify-content:center; }
.logo-icon svg { width:18px; height:18px; stroke:white; fill:none; stroke-width:2; }
.logo-name { font-size:15px; font-weight:600; letter-spacing:-0.01em; }
.logo-sub  { font-size:11px; color:var(--text2); font-weight:400; margin-top:-2px; }
.header-nav { display:flex; gap:4px; }
.nav-btn { padding:6px 16px; border-radius:6px; border:1px solid transparent; background:none; font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; color:var(--text2); transition:all .15s; font-weight:500; }
.nav-btn:hover { background:var(--bg); color:var(--text); }
.nav-btn.active { background:var(--red); color:white; }

.main { max-width:920px; margin:0 auto; padding:2rem 1.5rem; }
.panel { display:none; animation:fadeIn .2s ease; }
.panel.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

.section-block { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; margin-bottom:1.25rem; }
.section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text2); margin-bottom:1.25rem; padding-bottom:10px; border-bottom:1px solid var(--border); }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
@media(max-width:600px){ .grid-3 { grid-template-columns:1fr; } }
.field { display:flex; flex-direction:column; gap:5px; }
.field label { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; }
.field input, .field select, .field textarea { font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px 12px; outline:none; transition:border-color .15s; width:100%; }
.field input:focus, .field select:focus, .field textarea:focus { border-color:var(--red); background:white; }
.field textarea { min-height:72px; resize:vertical; }

/* FINDING CARD */
.findings-list { display:flex; flex-direction:column; gap:12px; }
.finding-card { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; background:var(--bg); }
.finding-head { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--surface); border-bottom:1px solid var(--border); }
.finding-num { width:22px; height:22px; border-radius:50%; background:var(--text); color:white; font-size:11px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.finding-head select { font-family:'DM Sans',sans-serif; font-size:13px; border:1px solid var(--border); border-radius:5px; padding:5px 8px; background:var(--bg); color:var(--text); flex:1; outline:none; }
.sev-select { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; border:1px solid; border-radius:5px; padding:5px 8px; cursor:pointer; outline:none; width:110px; flex-shrink:0; }
.sev-critical { background:var(--red-light); color:var(--red); border-color:var(--red-mid); }
.sev-medium   { background:var(--amber-light); color:var(--amber); border-color:#F0C070; }
.sev-ok       { background:var(--green-light); color:var(--green); border-color:#81C784; }
.remove-btn { background:none; border:none; cursor:pointer; color:var(--text3); font-size:18px; line-height:1; padding:2px 4px; border-radius:4px; flex-shrink:0; transition:color .1s; }
.remove-btn:hover { color:var(--red); }

/* FINDING BODY — obs | action | photos */
.finding-body { display:grid; grid-template-columns:1fr 1fr 190px; gap:12px; padding:12px 14px; align-items:start; }
@media(max-width:640px){ .finding-body { grid-template-columns:1fr; } }
.finding-body .field label { font-size:10px; }
.finding-body textarea { font-family:'DM Sans',sans-serif; font-size:13px; border:1px solid var(--border); border-radius:5px; padding:8px 10px; background:var(--surface); color:var(--text); min-height:80px; resize:vertical; width:100%; outline:none; transition:border-color .15s; }
.finding-body textarea:focus { border-color:var(--red); }

/* PHOTO ZONE */
.photo-zone { display:flex; flex-direction:column; gap:6px; }
.photo-zone-label { font-size:10px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; }
.photo-thumbs { display:flex; flex-wrap:wrap; gap:5px; min-height:20px; }
.photo-thumb { position:relative; width:54px; height:54px; border-radius:5px; overflow:hidden; border:1px solid var(--border); }
.photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; cursor:pointer; }
.photo-del { position:absolute; top:2px; right:2px; width:16px; height:16px; border-radius:50%; background:rgba(0,0,0,.6); color:white; border:none; cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; padding:0; }
.photo-del:hover { background:var(--red); }
.photo-add-row { display:flex; gap:5px; }
.photo-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:4px; padding:7px 4px; border:1px dashed var(--border2); border-radius:5px; background:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text2); transition:all .15s; }
.photo-btn:hover { border-color:var(--red); color:var(--red); background:var(--red-light); }
.photo-btn svg { width:12px; height:12px; flex-shrink:0; }

/* BUTTONS */
.btn-add { display:flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:10px; border:1.5px dashed var(--border2); border-radius:var(--radius); background:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text2); transition:all .15s; margin-top:4px; }
.btn-add:hover { border-color:var(--red); color:var(--red); background:var(--red-light); }
.btn-primary { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; background:var(--red); color:white; border:none; border-radius:var(--radius); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:opacity .15s; margin-top:4px; }
.btn-primary:hover { opacity:.88; }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; }
.btn-secondary { display:flex; align-items:center; justify-content:center; gap:7px; padding:10px 16px; background:var(--surface); color:var(--text); border:1px solid var(--border2); border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; }
.btn-secondary:hover { border-color:var(--text2); background:var(--bg); }
.btn-ai { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:11px; background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; color:var(--text); transition:all .15s; margin-bottom:10px; }
.btn-ai:hover { background:var(--blue-light); border-color:#90B8E8; color:var(--blue); }
.btn-ai:disabled { opacity:.4; cursor:not-allowed; }

.spinner { width:14px; height:14px; border:2px solid rgba(0,0,0,.12); border-top-color:var(--red); border-radius:50%; animation:spin .75s linear infinite; display:none; }
@keyframes spin { to{transform:rotate(360deg)} }
.ai-status { font-size:12px; color:var(--blue); text-align:center; padding:6px 0; display:none; }
.ai-status.show { display:block; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:1.5rem; }
@media(max-width:600px){ .stats-grid { grid-template-columns:1fr 1fr; } }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
.stat-val { font-size:26px; font-weight:600; line-height:1; }
.stat-lbl { font-size:11px; color:var(--text2); margin-top:4px; text-transform:uppercase; letter-spacing:.05em; }
.val-red{color:var(--red);} .val-amber{color:var(--amber);} .val-green{color:var(--green);}

.log-filters { display:flex; gap:10px; margin-bottom:1.25rem; }
.log-filters input { flex:1; }
.log-filters input, .log-filters select { font-family:'DM Sans',sans-serif; font-size:13px; border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 12px; background:var(--surface); color:var(--text); outline:none; }
.log-filters input:focus, .log-filters select:focus { border-color:var(--red); }
.log-entry { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px; margin-bottom:10px; cursor:pointer; transition:all .15s; }
.log-entry:hover { border-color:var(--border2); box-shadow:var(--shadow); }
.log-entry-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
.log-entry-name { font-size:15px; font-weight:600; }
.log-entry-meta { font-size:12px; color:var(--text2); margin-top:2px; }
.log-entry-count { font-size:12px; color:var(--text3); white-space:nowrap; }
.badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.badge { font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; }
.badge-red   { background:var(--red-light);   color:var(--red); }
.badge-amber { background:var(--amber-light); color:var(--amber); }
.badge-green { background:var(--green-light); color:var(--green); }
.badge-photo { background:#F0ECFF; color:#5B3ECC; }
.log-obs { font-size:12px; color:var(--text2); margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }

.empty { text-align:center; padding:3rem 1rem; color:var(--text3); font-size:14px; border:1.5px dashed var(--border); border-radius:var(--radius); }
.empty-icon { font-size:32px; margin-bottom:8px; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; align-items:center; justify-content:center; padding:1rem; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:14px; box-shadow:0 8px 40px rgba(0,0,0,.18); width:100%; max-width:760px; max-height:90vh; overflow-y:auto; padding:0; }
.modal-header-bar { padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; position:sticky; top:0; background:var(--surface); z-index:5; border-radius:14px 14px 0 0; }
.modal-title { font-size:17px; font-weight:600; }
.modal-sub { font-size:12px; color:var(--text2); margin-top:3px; }
.modal-close { background:none; border:none; cursor:pointer; font-size:22px; color:var(--text3); line-height:1; padding:2px 6px; border-radius:4px; }
.modal-close:hover { color:var(--red); }
.modal-body { padding:1.25rem 1.5rem; }
.modal-actions { display:flex; gap:8px; padding:1rem 1.5rem; border-top:1px solid var(--border); flex-wrap:wrap; }

/* REPORT TABLE — like original PDF */
.report-table { width:100%; border-collapse:collapse; font-size:13px; }
.report-table th { background:var(--bg); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--text2); padding:8px 10px; border:1px solid var(--border); text-align:left; }
.report-table td { border:1px solid var(--border); padding:10px 12px; vertical-align:top; }
.rt-area { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.03em; margin-bottom:4px; }
.rt-ref  { font-size:10px; color:var(--text3); margin-bottom:8px; }
.rt-obs  { font-size:13px; color:var(--text); margin-bottom:6px; }
.rt-action { font-size:12px; color:var(--blue); }
.rt-photos { display:flex; flex-wrap:wrap; gap:6px; }
.rt-photo { width:76px; height:76px; border-radius:6px; object-fit:cover; border:1px solid var(--border); cursor:pointer; transition:opacity .15s; }
.rt-photo:hover { opacity:.82; }
.rt-no-photo { font-size:11px; color:var(--text3); font-style:italic; }

/* LIGHTBOX */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:999; align-items:center; justify-content:center; }
.lightbox.open { display:flex; }
.lightbox img { max-width:90vw; max-height:90vh; border-radius:8px; object-fit:contain; }
.lightbox-close { position:absolute; top:18px; right:22px; background:none; border:none; color:white; font-size:32px; cursor:pointer; line-height:1; }

/* TOAST */
.toast { position:fixed; bottom:24px; right:24px; background:var(--text); color:white; padding:10px 18px; border-radius:8px; font-size:13px; font-weight:500; z-index:999; opacity:0; transition:opacity .25s; pointer-events:none; }
.toast.show { opacity:1; }

@media print {
  body { background:white; }
  header, .modal-overlay, .lightbox { display:none!important; }
  .main { padding:0; max-width:100%; }
  .panel { display:block!important; }
  #panel-nuevo { display:none!important; }
  .btn-primary,.btn-ai,.btn-add,.log-filters,.stats-grid,.modal-actions { display:none!important; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    </div>
    <div>
      <div class="logo-name">Arepepa — Revisiones</div>
      <div class="logo-sub">Sistema de gestión de inspecciones</div>
    </div>
  </div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="switchPanel('nuevo')">Nuevo informe</button>
    <button class="nav-btn" onclick="switchPanel('bitacora')">Bitácora</button>
  </div>
</header>

<div class="main">

  <!-- NUEVO INFORME -->
  <div id="panel-nuevo" class="panel active">
    <div class="section-block">
      <div class="section-title">Datos del punto de venta</div>
      <div class="grid-3">
        <div class="field"><label>Punto de venta</label><input type="text" id="f-punto" placeholder="Ej: Santa María" /></div>
        <div class="field"><label>Fecha de inspección</label><input type="date" id="f-fecha" /></div>
        <div class="field"><label>Administrador / Inspector</label><input type="text" id="f-admin" placeholder="Nombre" /></div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-title">Hallazgos detectados</div>
      <div class="findings-list" id="findingsList">
        <div class="empty"><div class="empty-icon">📋</div>Sin hallazgos. Agrega uno.</div>
      </div>
      <button class="btn-add" onclick="addFinding()">+ Agregar hallazgo</button>
    </div>

    <div class="section-block">
      <div class="section-title">Observaciones generales</div>
      <div class="field"><textarea id="f-obs" placeholder="Notas adicionales del inspector..."></textarea></div>
    </div>

    <div class="section-block" style="padding:1rem 1.5rem;">
      <button class="btn-ai" id="btnAI" onclick="generateWithAI()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span id="btnAIText">Generar acciones correctivas con IA</span>
        <div class="spinner" id="aiSpinner"></div>
      </button>
      <div class="ai-status" id="aiStatus">Consultando IA — puede tomar unos segundos...</div>
      <button class="btn-primary" onclick="saveReport()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Guardar informe en bitácora
      </button>
    </div>
  </div>

  <!-- BITÁCORA -->
  <div id="panel-bitacora" class="panel">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">Informes totales</div></div>
      <div class="stat-card"><div class="stat-val val-red" id="stat-crit">0</div><div class="stat-lbl">Hallazgos críticos</div></div>
      <div class="stat-card"><div class="stat-val val-amber" id="stat-med">0</div><div class="stat-lbl">Hallazgos medios</div></div>
      <div class="stat-card"><div class="stat-val val-green" id="stat-ptos">0</div><div class="stat-lbl">Puntos de venta</div></div>
    </div>
    <div class="log-filters">
      <input type="text" id="filter-q" placeholder="Buscar por punto de venta o inspector..." oninput="renderLog()" />
      <select id="filter-sev" onchange="renderLog()">
        <option value="">Todos los niveles</option>
        <option value="critical">Con críticos</option>
        <option value="medium">Con medios</option>
        <option value="ok">Solo leves</option>
      </select>
      <button class="btn-secondary" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar CSV
      </button>
    </div>
    <div id="logList"></div>
  </div>

</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalBox"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="Evidencia fotográfica" />
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- Hidden inputs -->
<input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFiles(event)" />
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleFiles(event)" />

<script>
const CATS = [
  {id:'edificacion',   label:'1. Edificación e instalaciones',     ref:'Res.2674/2013 Art.7, Art.33'},
  {id:'equipos',       label:'2. Equipos y utensilios',            ref:'Res.2674/2013 Art.9-14'},
  {id:'personal',      label:'3. Personal manipulador',            ref:'Res.2674/2013 Art.15-18'},
  {id:'materia',       label:'4. Materia prima e insumos',         ref:'Res.2674/2013 Art.19-21'},
  {id:'saneamiento',   label:'5. Saneamiento general',             ref:'Res.2674/2013 Art.26, Art.32'},
  {id:'instalaciones', label:'1.4 Instalaciones sanitarias',       ref:'Res.2674/2013 Art.6 Num.6.1-6.4'},
  {id:'plagas',        label:'5.4 Control integral de plagas',     ref:'Res.2674/2013 Art.26 Num.3'},
  {id:'residuos',      label:'5.3 Residuos sólidos',               ref:'Res.2674/2013 Art.6, Art.33'},
  {id:'limpieza',      label:'5.5 Limpieza y desinfección',        ref:'Res.2674/2013 Art.6 Num.6.5'},
  {id:'otro',          label:'Otro',                                ref:''},
];
const SEV = {
  critical:{label:'Crítico', cls:'sev-critical', badge:'badge-red'},
  medium:  {label:'Medio',   cls:'sev-medium',   badge:'badge-amber'},
  ok:      {label:'Leve',    cls:'sev-ok',        badge:'badge-green'},
};

let findings = [];
let seq = 0;
let activeFid = null;

document.getElementById('f-fecha').value = todayStr();
renderFindings(); renderLog(); updateStats();

function todayStr() { return new Date().toISOString().split('T')[0]; }

function switchPanel(p) {
  ['nuevo','bitacora'].forEach(id => document.getElementById('panel-'+id).classList.toggle('active', id===p));
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', ['nuevo','bitacora'][i]===p));
  if (p==='bitacora') { updateStats(); renderLog(); }
}

/* ---- FINDINGS ---- */
function addFinding(d) {
  const id = ++seq;
  findings.push({id, cat:d?.cat||'edificacion', sev:d?.sev||'critical', obs:d?.obs||'', action:d?.action||'', photos:[]});
  renderFindings();
}
function removeFinding(id) { findings=findings.filter(f=>f.id!==id); renderFindings(); }
function setField(id,key,val) {
  const f=findings.find(x=>x.id===id); if(!f) return; f[key]=val;
  if(key==='sev'){ const s=document.querySelector('[data-ss="'+id+'"]'); if(s) s.className='sev-select '+SEV[val].cls; }
}

function renderFindings() {
  const el=document.getElementById('findingsList');
  if(!findings.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>Sin hallazgos. Agrega uno.</div>'; return; }
  el.innerHTML=findings.map((f,i)=>{
    const catOpts=CATS.map(c=>'<option value="'+c.id+'"'+(f.cat===c.id?' selected':'')+'>'+c.label+'</option>').join('');
    const thumbs=(f.photos||[]).map((p,pi)=>`
      <div class="photo-thumb">
        <img src="${p}" onclick="openLb('${p}')" alt="foto"/>
        <button class="photo-del" onclick="rmPhoto(${f.id},${pi})">×</button>
      </div>`).join('');
    return `
    <div class="finding-card">
      <div class="finding-head">
        <div class="finding-num">${i+1}</div>
        <select onchange="setField(${f.id},'cat',this.value)" style="font-family:'DM Sans',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:5px;padding:5px 8px;background:var(--bg);color:var(--text);flex:1;outline:none;">${catOpts}</select>
        <select class="sev-select ${SEV[f.sev].cls}" data-ss="${f.id}" onchange="setField(${f.id},'sev',this.value)">
          <option value="critical"${f.sev==='critical'?' selected':''}>Crítico</option>
          <option value="medium"${f.sev==='medium'?' selected':''}>Medio</option>
          <option value="ok"${f.sev==='ok'?' selected':''}>Leve</option>
        </select>
        <button class="remove-btn" onclick="removeFinding(${f.id})">×</button>
      </div>
      <div class="finding-body">
        <div class="field">
          <label>Observación / novedad detectada</label>
          <textarea oninput="setField(${f.id},'obs',this.value)" placeholder="Describe el hallazgo...">${f.obs}</textarea>
        </div>
        <div class="field">
          <label>Acción correctiva</label>
          <textarea oninput="setField(${f.id},'action',this.value)" placeholder="Qué se debe corregir y cómo...">${f.action}</textarea>
        </div>
        <div class="photo-zone">
          <div class="photo-zone-label">Evidencia fotográfica</div>
          <div class="photo-thumbs" id="th-${f.id}">${thumbs}</div>
          <div class="photo-add-row">
            <button class="photo-btn" onclick="pickFile(${f.id})" title="Subir desde galería">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Subir
            </button>
            <button class="photo-btn" onclick="pickCam(${f.id})" title="Tomar foto">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
              Cámara
            </button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ---- PHOTOS ---- */
function pickFile(fid){ activeFid=fid; var el=document.getElementById('fileInput'); el.value=''; el.click(); }
function pickCam(fid) { activeFid=fid; var el=document.getElementById('cameraInput'); el.value=''; el.click(); }

function handleFiles(e) {
  var files=Array.from(e.target.files); if(!files.length||activeFid===null) return;
  var f=findings.find(x=>x.id===activeFid); if(!f) return;
  var done=0;
  files.forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(ev){ f.photos.push(ev.target.result); done++; if(done===files.length) renderFindings(); };
    reader.readAsDataURL(file);
  });
}

function rmPhoto(fid,idx){ var f=findings.find(x=>x.id===fid); if(f){f.photos.splice(idx,1); renderFindings();} }
function openLb(src){ document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }

/* ---- AI ---- */
async function generateWithAI() {
  var punto=document.getElementById('f-punto').value.trim();
  if(!punto){toast('Ingresa el punto de venta primero.');return;}
  if(!findings.length){toast('Agrega al menos un hallazgo.');return;}
  setAILoad(true);
  var lines=findings.map(function(f,i){
    var cat=CATS.find(function(c){return c.id===f.cat;}); 
    return i+'. Categoría: '+(cat?cat.label:f.cat)+' | Severidad: '+SEV[f.sev].label+' | Observación: "'+(f.obs||'sin descripción')+'"';
  }).join('\n');
  try {
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:'Eres experto en BPM y la Resolución 2674/2013 de Colombia para establecimientos de alimentos.\nPunto de venta: "'+punto+'"\nHallazgos:\n'+lines+'\nPara CADA hallazgo genera acción correctiva concreta, breve (1-2 oraciones), técnica y profesional.\nResponde ÚNICAMENTE en JSON sin bloques de código:\n{"sugerencias":[{"index":0,"accion":"..."}]}'}]})
    });
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').replace(/```json|```/g,'').trim();
    var parsed=JSON.parse(text);
    parsed.sugerencias.forEach(function(s){ if(findings[s.index]) findings[s.index].action=s.accion; });
    renderFindings(); toast('Acciones correctivas generadas ✓');
  } catch(e){ toast('Error al conectar con la IA.'); console.error(e); }
  setAILoad(false);
}
function setAILoad(on){
  document.getElementById('btnAI').disabled=on;
  document.getElementById('btnAIText').textContent=on?'Generando con IA...':'Generar acciones correctivas con IA';
  document.getElementById('aiSpinner').style.display=on?'block':'none';
  document.getElementById('aiStatus').classList.toggle('show',on);
}

/* ---- SAVE ---- */
function saveReport(){
  var punto=document.getElementById('f-punto').value.trim();
  var fecha=document.getElementById('f-fecha').value;
  var admin=document.getElementById('f-admin').value.trim();
  var obs=document.getElementById('f-obs').value.trim();
  if(!punto){toast('Ingresa el punto de venta.');return;}
  if(!fecha){toast('Ingresa la fecha.');return;}
  if(!findings.length){toast('Agrega al menos un hallazgo.');return;}
  var report={id:Date.now(),punto,fecha,admin,obs,findings:findings.map(function(f){return Object.assign({},f,{photos:f.photos.slice()});}),createdAt:new Date().toISOString()};
  var logs=getLog(); logs.unshift(report); setLog(logs);
  toast('Informe guardado en bitácora ✓');
  resetForm(); showModal(report);
}
function resetForm(){
  document.getElementById('f-punto').value='';
  document.getElementById('f-fecha').value=todayStr();
  document.getElementById('f-admin').value='';
  document.getElementById('f-obs').value='';
  findings=[]; seq=0; renderFindings();
}

/* ---- STORAGE ---- */
function getLog(){ try{return JSON.parse(localStorage.getItem('arepepa-v2')||'[]');}catch{return[];} }
function setLog(d){ try{localStorage.setItem('arepepa-v2',JSON.stringify(d));}catch{alert('Almacenamiento lleno. Las fotos ocupan mucho espacio; considera eliminar informes antiguos.');} }

/* ---- STATS ---- */
function updateStats(){
  var logs=getLog();
  document.getElementById('stat-total').textContent=logs.length;
  document.getElementById('stat-crit').textContent=logs.reduce(function(s,r){return s+r.findings.filter(function(f){return f.sev==='critical';}).length;},0);
  document.getElementById('stat-med').textContent=logs.reduce(function(s,r){return s+r.findings.filter(function(f){return f.sev==='medium';}).length;},0);
  document.getElementById('stat-ptos').textContent=new Set(logs.map(function(r){return r.punto;})).size;
}

/* ---- LOG ---- */
function renderLog(){
  updateStats();
  var logs=getLog();
  var q=(document.getElementById('filter-q')?document.getElementById('filter-q').value:'').toLowerCase();
  var sev=document.getElementById('filter-sev')?document.getElementById('filter-sev').value:'';
  var filtered=logs.filter(function(r){
    if(q && !r.punto.toLowerCase().includes(q) && !(r.admin||'').toLowerCase().includes(q)) return false;
    if(sev==='critical' && !r.findings.some(function(f){return f.sev==='critical';})) return false;
    if(sev==='medium'   && !r.findings.some(function(f){return f.sev==='medium';}))   return false;
    if(sev==='ok'       && r.findings.some(function(f){return f.sev!=='ok';}))        return false;
    return true;
  });
  var el=document.getElementById('logList');
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="empty-icon">🗂️</div>No hay informes que mostrar.</div>';return;}
  el.innerHTML=filtered.map(function(r){
    var crits=r.findings.filter(function(f){return f.sev==='critical';}).length;
    var meds=r.findings.filter(function(f){return f.sev==='medium';}).length;
    var oks=r.findings.filter(function(f){return f.sev==='ok';}).length;
    var pics=r.findings.reduce(function(s,f){return s+(f.photos||[]).length;},0);
    var rj=encodeURIComponent(JSON.stringify(r));
    return '<div class="log-entry" onclick="showModalEnc(\''+rj+'\')">'+
      '<div class="log-entry-top">'+
        '<div>'+
          '<div class="log-entry-name">'+r.punto+'</div>'+
          '<div class="log-entry-meta">'+fmtDate(r.fecha)+(r.admin?' &nbsp;·&nbsp; '+r.admin:'')+'</div>'+
        '</div>'+
        '<div class="log-entry-count">'+r.findings.length+' hallazgo'+(r.findings.length!==1?'s':'')+'</div>'+
      '</div>'+
      '<div class="badges">'+
        (crits?'<span class="badge badge-red">'+crits+' crítico'+(crits>1?'s':'')+'</span>':'')+
        (meds?'<span class="badge badge-amber">'+meds+' medio'+(meds>1?'s':'')+'</span>':'')+
        (oks?'<span class="badge badge-green">'+oks+' leve'+(oks>1?'s':'')+'</span>':'')+
        (pics?'<span class="badge badge-photo">'+pics+' foto'+(pics!==1?'s':'')+'</span>':'')+
      '</div>'+
      (r.obs?'<div class="log-obs">'+r.obs.substring(0,130)+(r.obs.length>130?'…':'')+'</div>':'')+
    '</div>';
  }).join('');
}

function fmtDate(d){
  if(!d) return '';
  var p=d.split('-'); var months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return parseInt(p[2])+' de '+months[parseInt(p[1])-1]+' de '+p[0];
}

/* ---- MODAL ---- */
function showModalEnc(enc){ showModal(JSON.parse(decodeURIComponent(enc))); }

function showModal(r){
  if(typeof r==='string') r=JSON.parse(r);
  var rows=r.findings.map(function(f){
    var cat=CATS.find(function(c){return c.id===f.cat;})||{label:f.cat,ref:''};
    var photos=(f.photos||[]);
    var photoHTML=photos.length
      ? photos.map(function(p){return '<img class="rt-photo" src="'+p+'" onclick="openLb(\''+p+'\')" alt="evidencia"/>';}).join('')
      : '<span class="rt-no-photo">Sin fotografías</span>';
    return '<tr>'+
      '<td style="width:22%">'+
        '<div class="rt-area">'+cat.label+'</div>'+
        (cat.ref?'<div class="rt-ref">'+cat.ref+'</div>':'')+
        '<span class="badge '+SEV[f.sev].badge+'">'+SEV[f.sev].label+'</span>'+
      '</td>'+
      '<td style="width:38%">'+
        '<div class="rt-obs">'+(f.obs||'—')+'</div>'+
        (f.action?'<div class="rt-action">&#x2794; '+f.action+'</div>':'')+
      '</td>'+
      '<td style="width:40%"><div class="rt-photos">'+photoHTML+'</div></td>'+
    '</tr>';
  }).join('');

  var rid=r.id;
  var rj=encodeURIComponent(JSON.stringify(r));

  document.getElementById('modalBox').innerHTML=
    '<div class="modal-header-bar">'+
      '<div>'+
        '<div class="modal-title">Informe &mdash; '+r.punto+'</div>'+
        '<div class="modal-sub">'+fmtDate(r.fecha)+(r.admin?' &nbsp;&middot;&nbsp; '+r.admin:'')+' &nbsp;&middot;&nbsp; '+r.findings.length+' hallazgo'+(r.findings.length!==1?'s':'')+'</div>'+
      '</div>'+
      '<button class="modal-close" onclick="closeModal()">&#215;</button>'+
    '</div>'+
    '<div class="modal-body">'+
      '<table class="report-table">'+
        '<thead><tr>'+
          '<th>&#193;rea / aspecto evaluado</th>'+
          '<th>Observaciones / novedades &amp; acciones correctivas</th>'+
          '<th>Evidencia fotogr&#225;fica</th>'+
        '</tr></thead>'+
        '<tbody>'+rows+'</tbody>'+
      '</table>'+
      (r.obs?'<div style="font-size:13px;color:var(--text2);padding:10px 0 4px"><strong>Observaciones generales:</strong> '+r.obs+'</div>':'')+
    '</div>'+
    '<div class="modal-actions">'+
      '<button class="btn-secondary" onclick="copyRep(\''+rj+'\')">'+
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>'+
        'Copiar texto'+
      '</button>'+
      '<button class="btn-secondary" onclick="window.print()">'+
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>'+
        'Imprimir / PDF'+
      '</button>'+
      '<button class="btn-secondary" onclick="delReport('+rid+')" style="color:var(--red);border-color:var(--red-mid);">'+
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>'+
        'Eliminar'+
      '</button>'+
    '</div>';

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function handleOverlayClick(e){ if(e.target===document.getElementById('modalOverlay')) closeModal(); }

/* ---- COPY ---- */
function copyRep(enc){
  var r=JSON.parse(decodeURIComponent(enc));
  var catLabel=function(id){ var c=CATS.find(function(x){return x.id===id;}); return c?c.label:id; };
  var txt='INFORME DE REVISIÓN — AREPEPA\nPunto de venta: '+r.punto+'\nFecha: '+fmtDate(r.fecha)+'\n'+(r.admin?'Inspector: '+r.admin+'\n':'')+'\nHALLAZGOS:\n';
  r.findings.forEach(function(f,i){
    txt+='\n'+(i+1)+'. '+catLabel(f.cat)+' ['+SEV[f.sev].label+']\n';
    if(f.obs)    txt+='   Observación: '+f.obs+'\n';
    if(f.action) txt+='   Acción correctiva: '+f.action+'\n';
    if((f.photos||[]).length) txt+='   Fotos adjuntas: '+f.photos.length+'\n';
  });
  if(r.obs) txt+='\nObservaciones generales:\n'+r.obs+'\n';
  navigator.clipboard.writeText(txt).then(function(){toast('Copiado al portapapeles ✓');});
}

/* ---- DELETE ---- */
function delReport(id){
  if(!confirm('¿Eliminar este informe de la bitácora?')) return;
  setLog(getLog().filter(function(r){return r.id!==id;}));
  closeModal(); renderLog(); updateStats(); toast('Informe eliminado.');
}

/* ---- EXPORT CSV ---- */
function exportCSV(){
  var logs=getLog();
  if(!logs.length){toast('No hay informes para exportar.');return;}
  var catLabel=function(id){ var c=CATS.find(function(x){return x.id===id;}); return c?c.label:id; };
  var rows=[['Punto de venta','Fecha','Inspector','Categoría','Severidad','Observación','Acción correctiva','Cant. fotos']];
  logs.forEach(function(r){
    r.findings.forEach(function(f){
      rows.push([r.punto,r.fecha,r.admin,catLabel(f.cat),SEV[f.sev]?SEV[f.sev].label:'',f.obs,f.action,(f.photos||[]).length]);
    });
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+(c||'').toString().replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='arepepa-'+todayStr()+'.csv';
  a.click(); toast('CSV exportado ✓');
}

/* ---- TOAST ---- */
function toast(msg,ms){
  ms=ms||2800; var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},ms);
}
</script>
