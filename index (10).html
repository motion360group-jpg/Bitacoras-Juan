<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arepepa — Sistema de Informes de Revisión</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:       #C0392B;
    --red-light: #FDECEA;
    --red-mid:   #E57373;
    --amber:     #B7770D;
    --amber-light:#FEF3DC;
    --green:     #2E7D32;
    --green-light:#E8F5E9;
    --blue:      #1565C0;
    --blue-light:#E3F0FF;
    --bg:        #F7F5F2;
    --surface:   #FFFFFF;
    --border:    #E2DDD8;
    --border2:   #CCC7C0;
    --text:      #1A1917;
    --text2:     #6B6760;
    --text3:     #A09D99;
    --accent:    #C0392B;
    --radius:    10px;
    --radius-sm: 6px;
    --shadow:    0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--red);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2; }
  .logo-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .logo-sub { font-size: 11px; color: var(--text2); font-weight: 400; margin-top: -2px; }

  .header-nav { display: flex; gap: 4px; }
  .nav-btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
    font-weight: 500;
  }
  .nav-btn:hover { background: var(--bg); color: var(--text); }
  .nav-btn.active { background: var(--red); color: white; }

  /* MAIN LAYOUT */
  .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* PANELS */
  .panel { display: none; animation: fadeIn 0.2s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* FORM SECTIONS */
  .section-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text2);
    margin-bottom: 1.25rem;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
  .field input, .field select, .field textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
    background: white;
  }
  .field textarea { min-height: 72px; resize: vertical; }

  /* FINDING CARDS */
  .findings-list { display: flex; flex-direction: column; gap: 10px; }
  .finding-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg);
    transition: border-color 0.15s;
  }
  .finding-card:hover { border-color: var(--border2); }
  .finding-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .finding-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--text);
    color: white;
    font-size: 11px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .finding-head select {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 8px;
    background: var(--bg);
    color: var(--text);
    flex: 1;
    cursor: pointer;
    outline: none;
  }
  .sev-select {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid;
    border-radius: 5px;
    padding: 5px 8px;
    cursor: pointer;
    outline: none;
    width: 110px;
    flex-shrink: 0;
  }
  .sev-critical { background: var(--red-light); color: var(--red); border-color: var(--red-mid); }
  .sev-medium   { background: var(--amber-light); color: var(--amber); border-color: #F0C070; }
  .sev-ok       { background: var(--green-light); color: var(--green); border-color: #81C784; }

  .remove-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 18px; line-height: 1;
    padding: 2px 4px; border-radius: 4px; flex-shrink: 0;
    transition: color 0.1s;
  }
  .remove-btn:hover { color: var(--red); }

  .finding-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px 14px;
  }
  @media (max-width: 560px) { .finding-body { grid-template-columns: 1fr; } }
  .finding-body .field label { font-size: 10px; }
  .finding-body textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px;
    background: var(--surface);
    color: var(--text);
    min-height: 70px;
    resize: vertical;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .finding-body textarea:focus { border-color: var(--accent); }

  /* BUTTONS */
  .btn-add {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; width: 100%; padding: 10px;
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    background: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text2);
    transition: all 0.15s; margin-top: 4px;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--red-light); }

  .btn-primary {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; width: 100%; padding: 13px;
    background: var(--red); color: white;
    border: none; border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s; margin-top: 4px;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    display: flex; align-items: center; justify-content: center;
    gap: 7px; padding: 10px 16px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--text2); background: var(--bg); }

  .btn-ai {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; width: 100%; padding: 11px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    color: var(--text); transition: all 0.15s; margin-bottom: 10px;
  }
  .btn-ai:hover { background: var(--blue-light); border-color: #90B8E8; color: var(--blue); }
  .btn-ai:disabled { opacity: 0.4; cursor: not-allowed; }

  .ai-star { color: var(--blue); }

  /* SPINNER */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.12);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    display: none;
  }
  .spinner-white { border-color: rgba(255,255,255,0.3); border-top-color: white; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr 1fr; } }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .stat-val { font-size: 26px; font-weight: 600; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .val-red   { color: var(--red); }
  .val-amber { color: var(--amber); }
  .val-green { color: var(--green); }

  /* LOG */
  .log-filters { display: flex; gap: 10px; margin-bottom: 1.25rem; }
  .log-filters input { flex: 1; }
  .log-filters input, .log-filters select {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
  .log-filters input:focus, .log-filters select:focus { border-color: var(--accent); }

  .log-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .log-entry:hover { border-color: var(--border2); box-shadow: var(--shadow); }
  .log-entry-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .log-entry-name { font-size: 15px; font-weight: 600; }
  .log-entry-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .log-entry-count { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .badge {
    font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 20px;
  }
  .badge-red    { background: var(--red-light); color: var(--red); }
  .badge-amber  { background: var(--amber-light); color: var(--amber); }
  .badge-green  { background: var(--green-light); color: var(--green); }
  .badge-blue   { background: var(--blue-light); color: var(--blue); }
  .log-obs { font-size: 12px; color: var(--text2); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

  /* EMPTY */
  .empty {
    text-align: center; padding: 3rem 1rem;
    color: var(--text3); font-size: 14px;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    width: 100%; max-width: 580px;
    max-height: 88vh; overflow-y: auto;
    padding: 1.75rem;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
  .modal-title { font-size: 17px; font-weight: 600; }
  .modal-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .modal-close {
    background: none; border: none; cursor: pointer;
    font-size: 22px; color: var(--text3); line-height: 1;
    padding: 2px 6px; border-radius: 4px;
  }
  .modal-close:hover { color: var(--red); }

  .report-finding {
    border-left: 3px solid var(--border2);
    padding: 10px 14px;
    margin-bottom: 10px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    background: var(--bg);
  }
  .report-finding.critical { border-left-color: var(--red); background: var(--red-light); }
  .report-finding.medium   { border-left-color: #F0A030; background: var(--amber-light); }
  .report-finding.ok       { border-left-color: #4CAF50; background: var(--green-light); }
  .rf-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 4px; }
  .rf-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; }
  .rf-obs { font-size: 13px; color: var(--text); margin-bottom: 4px; }
  .rf-action { font-size: 12px; color: var(--blue); }

  .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }

  /* PDF PRINT */
  @media print {
    body { background: white; font-size: 12px; }
    header, .modal-overlay { display: none !important; }
    .main { padding: 0; max-width: 100%; }
    .panel { display: block !important; }
    #panel-nuevo { display: none !important; }
    .section-block { box-shadow: none; border: 1px solid #ddd; }
    .btn-primary, .btn-ai, .btn-add, .log-filters, .stats-grid { display: none !important; }
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--text); color: white;
    padding: 10px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    z-index: 999; opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* AI STATUS */
  .ai-status {
    font-size: 12px; color: var(--blue);
    text-align: center; padding: 6px 0;
    display: none;
  }
  .ai-status.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    </div>
    <div>
      <div class="logo-name">Arepepa — Revisiones</div>
      <div class="logo-sub">Sistema de gestión de inspecciones</div>
    </div>
  </div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="switchPanel('nuevo')">Nuevo informe</button>
    <button class="nav-btn" onclick="switchPanel('bitacora')">Bitácora</button>
  </div>
</header>

<div class="main">

  <!-- ===== NUEVO INFORME ===== -->
  <div id="panel-nuevo" class="panel active">

    <div class="section-block">
      <div class="section-title">Datos del punto de venta</div>
      <div class="grid-3">
        <div class="field">
          <label>Punto de venta</label>
          <input type="text" id="f-punto" placeholder="Ej: Santa María" />
        </div>
        <div class="field">
          <label>Fecha de inspección</label>
          <input type="date" id="f-fecha" />
        </div>
        <div class="field">
          <label>Administrador</label>
          <input type="text" id="f-admin" placeholder="Nombre del inspector" />
        </div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-title">Hallazgos detectados</div>
      <div class="findings-list" id="findingsList">
        <div class="empty"><div class="empty-icon">📋</div>Sin hallazgos. Agrega uno.</div>
      </div>
      <button class="btn-add" onclick="addFinding()">+ Agregar hallazgo</button>
    </div>

    <div class="section-block">
      <div class="section-title">Observaciones generales</div>
      <div class="field">
        <textarea id="f-obs" placeholder="Notas adicionales del inspector, contexto general del punto de venta..."></textarea>
      </div>
    </div>

    <div class="section-block" style="padding: 1rem 1.5rem;">
      <button class="btn-ai" id="btnAI" onclick="generateWithAI()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="ai-star"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span id="btnAIText">Generar acciones correctivas con IA</span>
        <div class="spinner" id="aiSpinner"></div>
      </button>
      <div class="ai-status" id="aiStatus">Consultando modelo de IA — esto puede tomar unos segundos...</div>
      <button class="btn-primary" onclick="saveReport()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Guardar informe en bitácora
      </button>
    </div>

  </div>

  <!-- ===== BITÁCORA ===== -->
  <div id="panel-bitacora" class="panel">

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-lbl">Informes totales</div>
      </div>
      <div class="stat-card">
        <div class="stat-val val-red" id="stat-crit">0</div>
        <div class="stat-lbl">Hallazgos críticos</div>
      </div>
      <div class="stat-card">
        <div class="stat-val val-amber" id="stat-med">0</div>
        <div class="stat-lbl">Hallazgos medios</div>
      </div>
      <div class="stat-card">
        <div class="stat-val val-green" id="stat-ptos">0</div>
        <div class="stat-lbl">Puntos de venta</div>
      </div>
    </div>

    <div class="log-filters">
      <input type="text" id="filter-q" placeholder="Buscar por punto de venta..." oninput="renderLog()" />
      <select id="filter-sev" onchange="renderLog()">
        <option value="">Todos los niveles</option>
        <option value="critical">Con críticos</option>
        <option value="medium">Con medios</option>
        <option value="ok">Solo leves</option>
      </select>
      <button class="btn-secondary" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar CSV
      </button>
    </div>

    <div id="logList"></div>
  </div>

</div><!-- /main -->

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalBox"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ---- DATA ----
const CATS = [
  { id: 'edificacion',    label: '1. Edificación e instalaciones',        ref: 'Res.2674/2013 Art.7, Art.33' },
  { id: 'equipos',        label: '2. Equipos y utensilios',               ref: 'Res.2674/2013 Art.9-14' },
  { id: 'personal',       label: '3. Personal manipulador',               ref: 'Res.2674/2013 Art.15-18' },
  { id: 'materia',        label: '4. Materia prima e insumos',            ref: 'Res.2674/2013 Art.19-21' },
  { id: 'saneamiento',    label: '5. Saneamiento',                        ref: 'Res.2674/2013 Art.26, Art.32' },
  { id: 'instalaciones',  label: '1.4 Instalaciones sanitarias',          ref: 'Res.2674/2013 Art.6 Num.6.1-6.4' },
  { id: 'plagas',         label: '5.4 Control integral de plagas',        ref: 'Res.2674/2013 Art.26 Num.3' },
  { id: 'residuos',       label: '5.3 Residuos sólidos',                  ref: 'Res.2674/2013 Art.6, Art.33' },
  { id: 'limpieza',       label: '5.5 Limpieza y desinfección',           ref: 'Res.2674/2013 Art.6 Num.6.5' },
  { id: 'otro',           label: 'Otro',                                  ref: '' },
];

const SEV_INFO = {
  critical: { label: 'Crítico',  cls: 'sev-critical', badgeCls: 'badge-red',   rfCls: 'critical' },
  medium:   { label: 'Medio',    cls: 'sev-medium',   badgeCls: 'badge-amber', rfCls: 'medium'   },
  ok:       { label: 'Leve',     cls: 'sev-ok',       badgeCls: 'badge-green', rfCls: 'ok'       },
};

let findings = [];
let fidSeq = 0;

// ---- INIT ----
document.getElementById('f-fecha').value = todayStr();
renderLog();
updateStats();

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

// ---- PANEL SWITCH ----
function switchPanel(p) {
  ['nuevo','bitacora'].forEach(id => {
    document.getElementById('panel-' + id).classList.toggle('active', id === p);
  });
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['nuevo','bitacora'][i] === p);
  });
  if (p === 'bitacora') { updateStats(); renderLog(); }
}

// ---- FINDINGS ----
function addFinding(data) {
  const id = ++fidSeq;
  findings.push({
    id,
    cat:    data?.cat    || 'edificacion',
    sev:    data?.sev    || 'critical',
    obs:    data?.obs    || '',
    action: data?.action || '',
  });
  renderFindings();
}

function removeFinding(id) {
  findings = findings.filter(f => f.id !== id);
  renderFindings();
}

function setFinding(id, key, val) {
  const f = findings.find(x => x.id === id);
  if (f) f[key] = val;
  if (key === 'sev') updateSevSelect(id, val);
}

function updateSevSelect(id, sev) {
  const sel = document.querySelector(`[data-sev-sel="${id}"]`);
  if (!sel) return;
  sel.className = 'sev-select ' + SEV_INFO[sev].cls;
  sel.value = sev;
}

function renderFindings() {
  const el = document.getElementById('findingsList');
  if (findings.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Sin hallazgos. Agrega uno.</div>';
    return;
  }
  el.innerHTML = findings.map((f, idx) => {
    const catOpts = CATS.map(c => `<option value="${c.id}" ${f.cat===c.id?'selected':''}>${c.label}</option>`).join('');
    return `
    <div class="finding-card" id="fc-${f.id}">
      <div class="finding-head">
        <div class="finding-num">${idx+1}</div>
        <select onchange="setFinding(${f.id},'cat',this.value)" style="font-family:'DM Sans',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:5px;padding:5px 8px;background:var(--bg);color:var(--text);flex:1;outline:none;">
          ${catOpts}
        </select>
        <select class="sev-select ${SEV_INFO[f.sev].cls}" data-sev-sel="${f.id}"
                onchange="setFinding(${f.id},'sev',this.value)">
          <option value="critical" ${f.sev==='critical'?'selected':''}>Crítico</option>
          <option value="medium"   ${f.sev==='medium'?'selected':''}  >Medio</option>
          <option value="ok"       ${f.sev==='ok'?'selected':''}      >Leve</option>
        </select>
        <button class="remove-btn" onclick="removeFinding(${f.id})" title="Eliminar">×</button>
      </div>
      <div class="finding-body">
        <div class="field">
          <label>Observación / novedad detectada</label>
          <textarea data-fid="${f.id}" data-key="obs"
                    oninput="setFinding(${f.id},'obs',this.value)"
                    placeholder="Describe el hallazgo...">${f.obs}</textarea>
        </div>
        <div class="field">
          <label>Acción correctiva sugerida</label>
          <textarea data-fid="${f.id}" data-key="action"
                    oninput="setFinding(${f.id},'action',this.value)"
                    placeholder="Qué se debe corregir y cómo...">${f.action}</textarea>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ---- AI ----
async function generateWithAI() {
  const punto = document.getElementById('f-punto').value.trim();
  if (!punto) { toast('Ingresa el punto de venta primero.'); return; }
  if (findings.length === 0) { toast('Agrega al menos un hallazgo.'); return; }

  setAILoading(true);

  const lines = findings.map((f, i) => {
    const cat = CATS.find(c => c.id === f.cat)?.label || f.cat;
    return `${i}. Categoría: ${cat} | Severidad: ${SEV_INFO[f.sev]?.label} | Observación: "${f.obs || 'sin descripción'}"`;
  }).join('\n');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Eres experto en BPM y la Resolución 2674/2013 de Colombia para establecimientos de alimentos.
Punto de venta inspeccionado: "${punto}"
Hallazgos detectados:
${lines}

Para CADA hallazgo, genera una acción correctiva concreta, breve (1-2 oraciones), técnica y profesional basada en la normativa colombiana.
Responde ÚNICAMENTE en JSON válido sin bloques de código markdown, usando este formato exacto:
{"sugerencias":[{"index":0,"accion":"..."},{"index":1,"accion":"..."}]}`
        }]
      })
    });

    const data = await res.json();
    let text = (data.content || []).map(b => b.text || '').join('');
    text = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);

    parsed.sugerencias.forEach(s => {
      if (findings[s.index]) findings[s.index].action = s.accion;
    });
    renderFindings();
    toast('Acciones correctivas generadas ✓');
  } catch(e) {
    toast('Error al conectar con la IA. Verifica tu conexión.');
    console.error(e);
  }

  setAILoading(false);
}

function setAILoading(on) {
  document.getElementById('btnAI').disabled = on;
  document.getElementById('btnAIText').textContent = on ? 'Generando con IA...' : 'Generar acciones correctivas con IA';
  document.getElementById('aiSpinner').style.display = on ? 'block' : 'none';
  document.getElementById('aiStatus').classList.toggle('show', on);
}

// ---- SAVE REPORT ----
function saveReport() {
  const punto = document.getElementById('f-punto').value.trim();
  const fecha = document.getElementById('f-fecha').value;
  const admin = document.getElementById('f-admin').value.trim();
  const obs   = document.getElementById('f-obs').value.trim();

  if (!punto) { toast('Ingresa el punto de venta.'); return; }
  if (!fecha)  { toast('Ingresa la fecha.'); return; }
  if (findings.length === 0) { toast('Agrega al menos un hallazgo.'); return; }

  const report = {
    id: Date.now(),
    punto, fecha, admin, obs,
    findings: findings.map(f => ({ ...f })),
    createdAt: new Date().toISOString(),
  };

  const logs = getLog();
  logs.unshift(report);
  setLog(logs);

  toast('Informe guardado en bitácora ✓');
  resetForm();
  showModal(report);
}

// ---- STORAGE ----
function getLog() {
  try { return JSON.parse(localStorage.getItem('arepepa-reports') || '[]'); } catch { return []; }
}
function setLog(data) {
  try { localStorage.setItem('arepepa-reports', JSON.stringify(data)); } catch {}
}

// ---- RESET ----
function resetForm() {
  document.getElementById('f-punto').value = '';
  document.getElementById('f-fecha').value = todayStr();
  document.getElementById('f-admin').value = '';
  document.getElementById('f-obs').value   = '';
  findings = [];
  fidSeq   = 0;
  renderFindings();
}

// ---- STATS ----
function updateStats() {
  const logs = getLog();
  const crits  = logs.reduce((s,r) => s + r.findings.filter(f => f.sev === 'critical').length, 0);
  const meds   = logs.reduce((s,r) => s + r.findings.filter(f => f.sev === 'medium').length,   0);
  const puntos = new Set(logs.map(r => r.punto)).size;
  document.getElementById('stat-total').textContent = logs.length;
  document.getElementById('stat-crit').textContent  = crits;
  document.getElementById('stat-med').textContent   = meds;
  document.getElementById('stat-ptos').textContent  = puntos;
}

// ---- LOG ----
function renderLog() {
  const logs = getLog();
  const q    = (document.getElementById('filter-q')?.value || '').toLowerCase();
  const sev  = document.getElementById('filter-sev')?.value || '';
  updateStats();

  let filtered = logs.filter(r => {
    if (q && !r.punto.toLowerCase().includes(q) && !r.admin.toLowerCase().includes(q)) return false;
    if (sev === 'critical' && !r.findings.some(f => f.sev === 'critical')) return false;
    if (sev === 'medium'   && !r.findings.some(f => f.sev === 'medium'))   return false;
    if (sev === 'ok'       && r.findings.some(f => f.sev !== 'ok'))        return false;
    return true;
  });

  const el = document.getElementById('logList');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🗂️</div>No hay informes que mostrar.</div>';
    return;
  }

  el.innerHTML = filtered.map(r => {
    const dateStr = fmtDate(r.fecha);
    const crits   = r.findings.filter(f => f.sev === 'critical').length;
    const meds    = r.findings.filter(f => f.sev === 'medium').length;
    const oks     = r.findings.filter(f => f.sev === 'ok').length;
    const esc     = encodeURI(JSON.stringify(r));
    return `
    <div class="log-entry" onclick='showModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>
      <div class="log-entry-top">
        <div>
          <div class="log-entry-name">${r.punto}</div>
          <div class="log-entry-meta">${dateStr}${r.admin ? ' &nbsp;·&nbsp; ' + r.admin : ''}</div>
        </div>
        <div class="log-entry-count">${r.findings.length} hallazgo${r.findings.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="badges">
        ${crits ? `<span class="badge badge-red">${crits} crítico${crits>1?'s':''}</span>` : ''}
        ${meds  ? `<span class="badge badge-amber">${meds} medio${meds>1?'s':''}</span>`   : ''}
        ${oks   ? `<span class="badge badge-green">${oks} leve${oks>1?'s':''}</span>`       : ''}
      </div>
      ${r.obs ? `<div class="log-obs">${r.obs.substring(0,140)}${r.obs.length>140?'…':''}</div>` : ''}
    </div>`;
  }).join('');
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${parseInt(day)} de ${months[parseInt(m)-1]} de ${y}`;
}

// ---- MODAL ----
function showModal(r) {
  const catLabel = id => CATS.find(c => c.id === id)?.label || id;
  const catRef   = id => CATS.find(c => c.id === id)?.ref   || '';
  const dateStr  = fmtDate(r.fecha);

  const findingHTML = r.findings.map(f => `
    <div class="report-finding ${SEV_INFO[f.sev]?.rfCls}">
      <div class="rf-header">
        <div class="rf-title">${catLabel(f.cat)}</div>
        <span class="badge ${SEV_INFO[f.sev]?.badgeCls}">${SEV_INFO[f.sev]?.label}</span>
      </div>
      ${catRef(f.cat) ? `<div style="font-size:10px;color:var(--text3);margin-bottom:6px;">${catRef(f.cat)}</div>` : ''}
      ${f.obs    ? `<div class="rf-obs"><strong>Observación:</strong> ${f.obs}</div>` : ''}
      ${f.action ? `<div class="rf-action"><strong>Acción correctiva:</strong> ${f.action}</div>` : ''}
    </div>`).join('');

  const rj = JSON.stringify(r).replace(/"/g, '&quot;');

  document.getElementById('modalBox').innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">Informe — ${r.punto}</div>
        <div class="modal-sub">${dateStr}${r.admin ? ' &nbsp;·&nbsp; ' + r.admin : ''} &nbsp;·&nbsp; ${r.findings.length} hallazgo${r.findings.length!==1?'s':''}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    ${findingHTML}
    ${r.obs ? `<div style="font-size:13px;color:var(--text2);margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">${r.obs}</div>` : ''}
    <div class="modal-actions">
      <button class="btn-secondary" onclick='copyReport(${rj})'>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copiar texto
      </button>
      <button class="btn-secondary" onclick="window.print()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir / PDF
      </button>
      <button class="btn-secondary" onclick='deleteReport(${r.id})' style="color:var(--red);border-color:var(--red-mid);">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Eliminar
      </button>
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ---- COPY ----
function copyReport(r) {
  if (typeof r === 'string') r = JSON.parse(r);
  const catLabel = id => CATS.find(c => c.id === id)?.label || id;
  let txt = `INFORME DE REVISIÓN — AREPEPA\n`;
  txt += `Punto de venta: ${r.punto}\n`;
  txt += `Fecha: ${fmtDate(r.fecha)}\n`;
  if (r.admin) txt += `Inspector: ${r.admin}\n`;
  txt += `\nHALLAZGOS DETECTADOS\n${'─'.repeat(40)}\n`;
  r.findings.forEach((f, i) => {
    txt += `\n${i+1}. ${catLabel(f.cat)} [${SEV_INFO[f.sev]?.label}]\n`;
    if (f.obs)    txt += `   Observación: ${f.obs}\n`;
    if (f.action) txt += `   Acción correctiva: ${f.action}\n`;
  });
  if (r.obs) txt += `\nObservaciones generales:\n${r.obs}\n`;
  navigator.clipboard.writeText(txt).then(() => toast('Informe copiado al portapapeles ✓'));
}

// ---- DELETE ----
function deleteReport(id) {
  if (!confirm('¿Eliminar este informe de la bitácora?')) return;
  const logs = getLog().filter(r => r.id !== id);
  setLog(logs);
  closeModal();
  renderLog();
  updateStats();
  toast('Informe eliminado.');
}

// ---- EXPORT CSV ----
function exportCSV() {
  const logs = getLog();
  if (logs.length === 0) { toast('No hay informes para exportar.'); return; }
  const catLabel = id => CATS.find(c => c.id === id)?.label || id;
  const rows = [['Punto de venta','Fecha','Inspector','Categoría','Severidad','Observación','Acción correctiva']];
  logs.forEach(r => {
    r.findings.forEach(f => {
      rows.push([
        r.punto, r.fecha, r.admin,
        catLabel(f.cat), SEV_INFO[f.sev]?.label,
        f.obs, f.action
      ]);
    });
  });
  const csv = rows.map(r => r.map(c => `"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `arepepa-informes-${todayStr()}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast('CSV exportado ✓');
}

// ---- TOAST ----
function toast(msg, ms = 2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}
